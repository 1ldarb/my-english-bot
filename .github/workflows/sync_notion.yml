name: Sync to Notion Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download sync script
        run: |
          curl -fsSL -o sync_notion.py \
            https://raw.githubusercontent.com/1ldarb/central-repo/main/sync_notion.py

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.event.repository.html_url }}
          REPO_DESCRIPTION: ${{ github.event.repository.description }}
          REPO_TOPICS: ${{ join(github.event.repository.topics, ',') }}
        run: python sync_notion.py

